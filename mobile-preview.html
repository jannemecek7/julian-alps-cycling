<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Julian Alps Cycling - mobile preview</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#171a18;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;align-items:center;justify-content:center;padding:28px}
.preview-shell{display:grid;gap:14px;justify-items:center}
.preview-label{font-size:13px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.58)}
.phone-frame{width:390px;height:844px;max-width:calc(100vw - 32px);max-height:calc(100vh - 82px);border:12px solid #0a0b0a;border-radius:42px;background:#0a0b0a;box-shadow:0 30px 100px rgba(0,0,0,0.55),inset 0 0 0 1px rgba(255,255,255,0.08);overflow:hidden}
iframe{width:100%;height:100%;border:0;background:#fff;border-radius:28px}
@media(max-width:520px){
  body{padding:0;background:#fff}
  .preview-label{display:none}
  .phone-frame{width:100vw;height:100vh;max-width:none;max-height:none;border:0;border-radius:0;box-shadow:none}
  iframe{border-radius:0}
}
</style>
</head>
<body>
  <main class="preview-shell">
    <div class="preview-label">Mobile preview - 390 px</div>
    <div class="phone-frame">
      <iframe src="index.html" title="Julian Alps Cycling mobile preview"></iframe>
    </div>
  </main>
</body>
</html>
